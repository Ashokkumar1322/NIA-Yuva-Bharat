<script>
    const rowCount = 6;
    
    // --- 1. PREMIUM DATA STRUCTURE ---
    // Template populated with Base Plan -> Annual and Maternity Optional Cover.
    // You will need to fill in the remaining arrays from the PDF tables.
    const premiumData = {
        "Base Plan": {
            "Annual": {
                "Zone 1": {
                    "5 Lakh": { "0-17": 4279, "18-30": 6094, "31-35": 7370, "36-40": 9301, "41-45": 12238, "46-50": 14652, "51-55": 18887, "56-60": 21318, "61-65": 28870, ">65": 32648 },
                    "10 Lakh": { "0-17": 5247, "18-30": 7486, "31-35": 9070, "36-40": 11457, "41-45": 15081, "46-50": 18062, "51-55": 23298, "56-60": 26301, "61-65": 35629, ">65": 40299 },
                    "15 Lakh": { "0-17": 6529, "18-30": 9334, "31-35": 11314, "36-40": 14306, "41-45": 18843, "46-50": 22578, "51-55": 29134, "56-60": 32890, "61-65": 44578, ">65": 50424 },
                    "25 Lakh": { "0-17": 8773, "18-30": 12573, "31-35": 15252, "36-40": 19294, "41-45": 25438, "46-50": 30492, "51-55": 39358, "56-60": 44446, "61-65": 60253, ">65": 68162 },
                    "50 Lakh": { "0-17": 12194, "18-30": 17501, "31-35": 21247, "36-40": 26895, "41-45": 35486, "46-50": 42548, "51-55": 54940, "56-60": 62046, "61-65": 84145, ">65": 95194 },
                    "75 Lakh": { "0-17": 13789, "18-30": 19800, "31-35": 24041, "36-40": 30437, "41-45": 40167, "46-50": 48164, "51-55": 62194, "56-60": 70246, "61-65": 95271, ">65": 107789 },
                    "1 Cr": { "0-17": 14916, "18-30": 21428, "31-35": 26026, "36-40": 32951, "41-45": 43489, "46-50": 52146, "51-55": 67348, "56-60": 76065, "61-65": 103169, ">65": 116727 }
                },
                "Zone 2": {
                    "5 Lakh": { "0-17": 3501, "18-30": 4986, "31-35": 6030, "36-40": 7610, "41-45": 10013, "46-50": 11988, "51-55": 15453, "56-60": 17442, "61-65": 23621, ">65": 26712 },
                    "10 Lakh": { "0-17": 4293, "18-30": 6125, "31-35": 7421, "36-40": 9374, "41-45": 12339, "46-50": 14778, "51-55": 19062, "56-60": 21519, "61-65": 29151, ">65": 32972 },
                    "15 Lakh": { "0-17": 5342, "18-30": 7637, "31-35": 9257, "36-40": 11705, "41-45": 15417, "46-50": 18473, "51-55": 23837, "56-60": 26910, "61-65": 36473, ">65": 41256 },
                    "25 Lakh": { "0-17": 7178, "18-30": 10287, "31-35": 12479, "36-40": 15786, "41-45": 20813, "46-50": 24948, "51-55": 32202, "56-60": 36365, "61-65": 49298, ">65": 55769 },
                    "50 Lakh": { "0-17": 9977, "18-30": 14339, "31-35": 17384, "36-40": 22005, "41-45": 29034, "46-50": 34812, "51-55": 44951, "56-60": 50765, "61-65": 68846, ">65": 77886 },
                    "75 Lakh": { "0-17": 11282, "18-30": 16200, "31-35": 19670, "36-40": 24903, "41-45": 32864, "46-50": 39407, "51-55": 50886, "56-60": 57474, "61-65": 77949, ">65": 88191 },
                    "1 Cr": { "0-17": 12204, "18-30": 17532, "31-35": 21294, "36-40": 26960, "41-45": 35582, "46-50": 42665, "51-55": 55103, "56-60": 62235, "61-65": 84411, ">65": 95504 }
                }
            }
            // Add "Half Yearly", "Quarterly", "Monthly" here
        },
        "Gold Plan": {
            // Populate similar to Base Plan
        },
        "Platinum Plan": {
            // Populate similar to Base Plan
        }
    };

    const maternityRates = {
        "Zone 1": {
            "50,000": { "Annual": 10096, "Half Yearly": 5231, "Quarterly": 2665, "Monthly": 900 },
            "75,000": { "Annual": 15144, "Half Yearly": 7846, "Quarterly": 3998, "Monthly": 1349 },
            "1,00,000": { "Annual": 20193, "Half Yearly": 10462, "Quarterly": 5331, "Monthly": 1799 }
        },
        "Zone 2": {
            "50,000": { "Annual": 8260, "Half Yearly": 4280, "Quarterly": 2181, "Monthly": 736 },
            "75,000": { "Annual": 12390, "Half Yearly": 6419, "Quarterly": 3271, "Monthly": 1104 },
            "1,00,000": { "Annual": 16521, "Half Yearly": 8560, "Quarterly": 4362, "Monthly": 1472 }
        }
    };

    function getAgeBand(age) {
        if (!age && age !== 0) return null;
        if (age <= 17) return "0-17";
        if (age <= 30) return "18-30";
        if (age <= 35) return "31-35";
        if (age <= 40) return "36-40";
        if (age <= 45) return "41-45";
        if (age <= 50) return "46-50";
        if (age <= 55) return "51-55";
        if (age <= 60) return "56-60";
        if (age <= 65) return "61-65";
        return ">65";
    }

    // --- 2. POPULATE MAIN ENTRY TABLE ---
    const tbody = document.getElementById('calculator-body');
    const relations = ['Self', 'Spouse', 'Children', 'Parents'];
    const sumInsuredOptions = ['5 Lakh', '10 Lakh', '15 Lakh', '25 Lakh', '50 Lakh', '75 Lakh', '1 Cr'];
    
    const bmiOptions = `<option value="">Select...</option><option value=">=18.5 <=32">&gt;=18.5 &lt;=32 (-2.5%)</option><option value="> 32">&gt; 32 (+2.5%)</option>`;
    const diabeticOptions = `<option value="">Select...</option><option value="<6.4 HbA1c">&lt;6.4 HbA1c (-2.5%)</option><option value="HbA1c > 6.4">HbA1c &gt; 6.4 (+2.5%)</option>`;
    const hypertensiveOptions = `<option value="">Select...</option><option value="<=120/80">&lt;=120/80 (-2.5%)</option><option value=">139/89">&gt;139/89 (+2.5%)</option>`;
    const hospitalisationOptions = `<option value="">Select...</option><option value="Not in past 3 yrs">Not in past 3 yrs (-2.5%)</option>`;
    const yesNoOptions = `<option value="No">No</option><option value="Yes">Yes</option>`;

    for (let i = 1; i <= rowCount; i++) {
        const tr = document.createElement('tr');
        
        let relationHTML = '<option value="">Select...</option>';
        relations.forEach(rel => relationHTML += `<option value="${rel}">${rel}</option>`);
        let sumInsuredHTML = '<option value="">Select...</option>';
        sumInsuredOptions.forEach(amount => sumInsuredHTML += `<option value="${amount}">${amount}</option>`);

        tr.innerHTML = `
            <td style="text-align: center; color: #777;">${i}</td>
            <td><input type="text" id="name_${i}" class="calc-trigger" placeholder="Enter name"></td>
            <td><input type="number" id="age_${i}" class="calc-trigger" min="0" placeholder="Age"></td>
            <td><select id="relation_${i}">${relationHTML}</select></td>
            <td><select id="sumInsured_${i}" class="calc-trigger">${sumInsuredHTML}</select></td>
            <td class="divider-left"><select id="bmi_${i}" class="calc-trigger">${bmiOptions}</select></td>
            <td><select id="diabetic_${i}" class="calc-trigger">${diabeticOptions}</select></td>
            <td><select id="hypertensive_${i}" class="calc-trigger">${hypertensiveOptions}</select></td>
            <td><select id="hospitalisation_${i}" class="calc-trigger">${hospitalisationOptions}</select></td>
            <td class="divider-left"><select id="nonMedical_${i}">${yesNoOptions}</select></td>
            <td><select id="modernTreatments_${i}">${yesNoOptions}</select></td>
            <td><select id="durableDevices_${i}">${yesNoOptions}</select></td>
            <td><select id="prePostHosp_${i}">${yesNoOptions}</select></td>
            <td><select id="criticalIllness_${i}">${yesNoOptions}</select></td>
        `;
        tbody.appendChild(tr);
    }

    // --- 3. POPULATE PREMIUM WORKING TABLE ---
    const workingBody = document.getElementById('working-body');
    const workingRowsConfig = [
        { label: "Name", action: "" },
        { label: "Basic Premium", action: "" },
        { label: "HEALTH DISCOUNTS/LOADINGS", action: "", styleClass: "row-header" },
        { label: "BMI", action: "minus /add" },
        { label: "Diabetic", action: "minus /add" },
        { label: "Hypertensive", action: "minus /add" },
        { label: "No Hospitalisation", action: "minus" },
        { label: "Total A", action: "", styleClass: "row-total" },
        { label: "Maternity Enhancement (Platinum Plan)", action: "add" },
        { label: "Floater Discount", action: "minus" },
        { label: "Loyalty Discount", action: "minus" },
        { label: "Total B", action: "", styleClass: "row-total" },
        { label: "RIDERS", action: "", styleClass: "row-header" },
        { label: "Non medical consumables Rider", action: "add" },
        { label: "Modern Treatment Rider", action: "add" },
        { label: "Durable Medical Devices Rider", action: "add" },
        { label: "Pre & Post Hospitalisation Rider", action: "add" },
        { label: "Critical Illness Rider (18-45 yr only)", action: "add" },
        { label: "Total C", action: "", styleClass: "row-total" },
        { label: "Long Term Discount", action: "minus" },
        { label: "Premium-Each member", action: "", styleClass: "row-total" },
        { label: "GRAND TOTAL- Final Premium payable", action: "", styleClass: "row-final" }
    ];

    workingRowsConfig.forEach((row) => {
        const tr = document.createElement('tr');
        if (row.styleClass) tr.classList.add(row.styleClass);
        
        if (row.styleClass === "row-header") {
            tr.innerHTML = `<td colspan="8">${row.label}</td>`;
        } else if (row.label === "GRAND TOTAL- Final Premium payable") {
            tr.innerHTML = `
                <td class="col-label" colspan="2" style="text-align: right; padding-right: 20px;">${row.label}</td>
                <td colspan="6">
                    <input type="text" id="grand_total_premium" readonly placeholder="0.00" style="border:none; background:transparent; font-weight:bold; font-size: 16px; text-align:center; color: #b45309; width: 100%;">
                </td>
            `;
        } else {
            let html = `
                <td class="col-label">${row.label}</td>
                <td class="col-action">${row.action}</td>
            `;
            for (let i = 1; i <= 6; i++) {
                let safeId = row.label.replace(/[^a-zA-Z0-9]/g, ''); 
                let readonlyClass = (row.action === "minus /add" || row.action === "minus" || row.label === "Basic Premium" || row.label === "Maternity Enhancement Platinum Plan" || row.label === "Floater Discount" || row.label === "Loyalty Discount" || row.label === "Long Term Discount") ? "readonly style='background-color:#f8f9fa; border:none;'" : "";
                
                if(row.label === "Name") {
                    html += `<td><input type="text" id="wrk_${safeId}_${i}" class="working-input" readonly style="border:none; background:transparent; font-weight:bold; text-align:center;"></td>`;
                } else {
                    html += `<td><input type="number" step="0.01" id="wrk_${safeId}_${i}" class="working-input manual-rider" ${readonlyClass}></td>`;
                }
            }
            tr.innerHTML = html;
        }
        workingBody.appendChild(tr);
    });

    // --- 4. CALCULATION LOGIC ---
    function setupEventListeners() {
        // Listen to top table inputs to trigger calc
        document.querySelectorAll('.calc-trigger').forEach(input => {
            input.addEventListener('input', calculateFinalTotals);
            input.addEventListener('change', calculateFinalTotals);
        });
        
        // Listen to global dropdowns
        ['zone', 'planType', 'policyPeriod', 'frequency', 'loyaltyDiscount', 'indFloater', 'maternityCover'].forEach(id => {
            document.getElementById(id).addEventListener('change', calculateFinalTotals);
        });

        // Sync Names
        for (let i = 1; i <= rowCount; i++) {
            const nameInput = document.getElementById(`name_${i}`);
            if (nameInput) {
                nameInput.addEventListener('input', (e) => {
                    document.getElementById(`wrk_Name_${i}`).value = e.target.value;
                });
            }
        }
        
        // Listen for manual Rider inputs in working table
        document.querySelectorAll('.manual-rider').forEach(input => {
            if(!input.readOnly) input.addEventListener('input', calculateFinalTotals);
        });
    }

    function calculateFinalTotals() {
        const zoneRaw = document.getElementById('zone').value;
        const zone = zoneRaw.includes("Zone 1") ? "Zone 1" : "Zone 2";
        const plan = document.getElementById('planType').value;
        const freq = document.getElementById('frequency').value;
        const policyPeriod = document.getElementById('policyPeriod').value;
        const isFloater = document.getElementById('indFloater').value === "Floater";
        const isLoyalty = document.getElementById('loyaltyDiscount').value === "Yes";
        const maternityVal = document.getElementById('maternityCover').value;

        let grandTotal = 0;
        let activeMembers = 0;
        let totalBasePremiums = 0; // For floater discount calculation

        // First Pass: Get Basic Premiums and count members
        for (let i = 1; i <= rowCount; i++) {
            const age = parseInt(document.getElementById(`age_${i}`).value);
            const si = document.getElementById(`sumInsured_${i}`).value;
            const ageBand = getAgeBand(age);
            
            let basicPremium = 0;
            
            if (ageBand && si && premiumData[plan] && premiumData[plan][freq] && premiumData[plan][freq][zone] && premiumData[plan][freq][zone][si]) {
                basicPremium = premiumData[plan][freq][zone][si][ageBand] || 0;
            }
            
            if (basicPremium > 0) {
                activeMembers++;
                totalBasePremiums += basicPremium;
            }
            
            // Set Basic Premium (even if 0 to clear it out)
            const basicEl = document.getElementById(`wrk_BasicPremium_${i}`);
            if(basicEl) basicEl.value = basicPremium > 0 ? basicPremium : "";
        }

        // Determine Floater Discount %
        let floaterPct = 0;
        if (isFloater && activeMembers > 1) {
            if (activeMembers === 2) floaterPct = 0.05;
            if (activeMembers === 3) floaterPct = 0.10;
            if (activeMembers >= 4) floaterPct = 0.15;
        }

        // Second Pass: Calculate Totals
        for (let i = 1; i <= rowCount; i++) {
            const age = parseInt(document.getElementById(`age_${i}`).value);
            let basic = parseFloat(document.getElementById(`wrk_BasicPremium_${i}`).value) || 0;
            
            const setTotal = (id, amount, isDiscount = false) => {
                const el = document.getElementById(`wrk_${id}_${i}`);
                if (el) el.value = amount !== 0 ? (isDiscount ? -Math.abs(amount).toFixed(2) : amount.toFixed(2)) : "";
            };
            const getVal = (id) => parseFloat(document.getElementById(`wrk_${id}_${i}`)?.value) || 0;

            if (basic <= 0) {
                ['TotalA', 'TotalB', 'TotalC', 'PremiumEachmember', 'BMI', 'Diabetic', 'Hypertensive', 'NoHospitalisation', 'FloaterDiscount', 'LoyaltyDiscount', 'MaternityEnhancementPlatinumPlan', 'LongTermDiscount'].forEach(id => setTotal(id, 0));
                continue; 
            }

            // Health parameters (Only for age >= 18)
            let bmiAmt = 0, diabeticAmt = 0, hyperAmt = 0, hospAmt = 0;
            
            if (age >= 18) {
                const bmi = document.getElementById(`bmi_${i}`).value;
                if (bmi.includes("<=32")) bmiAmt = -(basic * 0.025);
                if (bmi.includes("> 32")) bmiAmt = (basic * 0.025);
                
                const diabetic = document.getElementById(`diabetic_${i}`).value;
                if (diabetic.includes("<6.4")) diabeticAmt = -(basic * 0.025);
                if (diabetic.includes("> 6.4")) diabeticAmt = (basic * 0.025);
                
                const hyper = document.getElementById(`hypertensive_${i}`).value;
                if (hyper.includes("<=120/80")) hyperAmt = -(basic * 0.025);
                if (hyper.includes(">139/89")) hyperAmt = (basic * 0.025);
                
                const hosp = document.getElementById(`hospitalisation_${i}`).value;
                if (hosp !== "") hospAmt = -(basic * 0.025);
            }

            setTotal('BMI', bmiAmt);
            setTotal('Diabetic', diabeticAmt);
            setTotal('Hypertensive', hyperAmt);
            setTotal('NoHospitalisation', hospAmt, true);

            let totalA = basic + bmiAmt + diabeticAmt + hyperAmt + hospAmt;
            setTotal('TotalA', totalA);

            // Maternity (Platinum Only)
            let maternityAmt = 0;
            if (plan === "Platinum Plan" && maternityVal !== "None" && maternityRates[zone] && maternityRates[zone][maternityVal]) {
                 // The assumption is maternity is charged per eligible adult, adjust logic if it is charged once per policy
                 maternityAmt = maternityRates[zone][maternityVal][freq] || 0;
            }
            setTotal('MaternityEnhancementPlatinumPlan', maternityAmt);

            // Floater & Loyalty Discounts applied to basic premium
            let floaterAmt = basic * floaterPct;
            let loyaltyAmt = isLoyalty ? (basic * 0.025) : 0;
            
            setTotal('FloaterDiscount', floaterAmt, true);
            setTotal('LoyaltyDiscount', loyaltyAmt, true);

            let totalB = totalA + maternityAmt - floaterAmt - loyaltyAmt;
            if (totalB < 0) totalB = 0;
            setTotal('TotalB', totalB);

            // Riders
            let totalC = getVal('NonmedicalconsumablesRider') + getVal('ModernTreatmentRider') + getVal('DurableMedicalDevicesRider') + getVal('PrePostHospitalisationRider') + getVal('CriticalIllnessRider1845yronly');
            setTotal('TotalC', totalC);

            // Long Term Discount on final premium
            let preTermPremium = totalB + totalC;
            let longTermPct = 0;
            if (policyPeriod === "2 yr") longTermPct = 0.05;
            if (policyPeriod === "3 yr") longTermPct = 0.07;
            
            let longTermAmt = preTermPremium * longTermPct;
            setTotal('LongTermDiscount', longTermAmt, true);

            let memberPremium = preTermPremium - longTermAmt;
            setTotal('PremiumEachmember', memberPremium);

            grandTotal += memberPremium;
        }

        const grandTotalElement = document.getElementById('grand_total_premium');
        if (grandTotalElement) {
            grandTotalElement.value = grandTotal > 0 ? "₹ " + grandTotal.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : "";
        }
    }

    setupEventListeners();
</script>
